# India-focused defensive AppSec baselines for government, education,
# BFSI, and enterprise stacks (CERT-In / MeitY-oriented hygiene).
# Defensive detection only — no live targeting of third-party systems.

- id: php-mysqli-sqli
  title: Possible SQL injection via mysqli query concatenation
  message: "String-built SQL in PHP is a common CMS/portal issue; use prepared statements"
  severity: high
  cwe: ["CWE-89"]
  owasp: ["A05:2025"]
  category: injection
  languages: ["php"]
  pattern: "mysqli_(query|real_query)\\s*\\(\\s*\\$.*\\."
  confidence: 0.7
  exploitability: 0.75

- id: php-mysql-query-concat
  title: Legacy mysql_query with dynamic SQL
  message: "Deprecated mysql_* APIs with concatenation are high-risk on legacy portals"
  severity: critical
  cwe: ["CWE-89"]
  owasp: ["A05:2025"]
  category: injection
  languages: ["php"]
  pattern: "mysql_query\\s*\\("
  confidence: 0.8
  exploitability: 0.85

- id: php-eval
