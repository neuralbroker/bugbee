  exploitability: 0.85

- id: php-display-errors
  title: PHP display_errors enabled
  message: "Error display leaks paths and stack data — common on shared hosting and campus portals"
  severity: medium
  cwe: ["CWE-209"]
  owasp: ["A02:2025"]
  category: misconfig
  languages: ["php"]
  pattern: "(?i)display_errors\\s*[=,]\\s*(On|1|true)|ini_set\\s*\\(\\s*['\"]display_errors['\"]"
  confidence: 0.65
  exploitability: 0.4

- id: java-sql-concat
  title: Java SQL string concatenation
  message: "Prefer PreparedStatement; concat SQL is common in bank/ERP integrations"
  severity: high
  cwe: ["CWE-89"]
  owasp: ["A05:2025"]
  category: injection
  languages: ["java"]
  pattern: "(Statement\\s+\\w+|createStatement\\s*\\().*(execute|executeQuery)\\s*\\(\\s*\".*\\+"
  confidence: 0.55
  exploitability: 0.7

- id: java-runtime-exec
  title: Runtime.exec / ProcessBuilder shell risk
  message: "Process launch from app code needs strict allowlists"
  severity: high
  cwe: ["CWE-78"]
  owasp: ["A05:2025"]
  category: injection
  languages: ["java"]
  pattern: "Runtime\\.getRuntime\\(\\)\\.exec\\s*\\(|new\\s+ProcessBuilder\\s*\\("
  confidence: 0.7
  exploitability: 0.75

- id: java-md5-password
  title: Weak password hashing (MD5/SHA1) in Java
  message: "Use bcrypt/Argon2/scrypt; MD5/SHA1 remain widespread in legacy India enterprise code"
  severity: high
  cwe: ["CWE-328"]
  owasp: ["A04:2025"]
  category: crypto
  languages: ["java"]
  pattern: "MessageDigest\\.getInstance\\s*\\(\\s*\"(MD5|SHA-?1)\""
  confidence: 0.7
  exploitability: 0.55

- id: java-trust-all-certs
  title: Trust-all TLS / HostnameVerifier
  message: "Disabling certificate validation breaks MITM protections for payment/API clients"
  severity: critical
  cwe: ["CWE-295"]
  owasp: ["A02:2025"]
  category: misconfig
  languages: ["java"]
  pattern: "TrustAll|trustAllCerts|ALLOW_ALL_HOSTNAME|HostnameVerifier\\s*\\{[^}]*return\\s+true"
  confidence: 0.75
  exploitability: 0.8

