[project]
name = "bugbee"
description = "Bugbee security project"

[hunt]
packs = [
    "rules/**/*.yaml",
    "rules/**/*.yml",
]
secrets = true
rules = true
aggressive = true
exclude = []

[policy]
sensitive_paths = [
    "**/.env",
    "**/.env.*",
    "**/secrets/**",
    "**/*credential*",
    "**/id_rsa",
    "**/*.pem",
]
redact_secrets = true
defense_only = true

[provider]
