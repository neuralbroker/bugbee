name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Run strict linting
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust_target: ""
            executable: bugbee
          # Cross-compile Intel macOS on Apple Silicon (macos-13 runners are scarce).
          - os: macos-14
            target: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            executable: bugbee
          - os: macos-14
            target: aarch64-apple-darwin
            rust_target: ""
            executable: bugbee
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rust_target: ""
            executable: bugbee.exe

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.rust_target }}" ]]; then
            cargo build --locked --release -p bugbee-cli --target "${{ matrix.rust_target }}"
            BIN="target/${{ matrix.rust_target }}/release/${{ matrix.executable }}"
          else
            cargo build --locked --release -p bugbee-cli
            BIN="target/release/${{ matrix.executable }}"
          fi
          echo "BIN_PATH=${BIN}" >> "$GITHUB_ENV"
          test -f "${BIN}"

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          archive="dist/bugbee-${{ matrix.target }}.tar.gz"
          # Place the binary at archive root as "bugbee" for the installer.
          stage="$(mktemp -d)"
          cp "${BIN_PATH}" "${stage}/bugbee"
          tar -C "${stage}" -czf "${archive}" bugbee
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path "$env:BIN_PATH" -DestinationPath "dist/bugbee-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "dist/bugbee-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  bugbee-${{ matrix.target }}.zip" | Out-File -Encoding ascii "dist/bugbee-${{ matrix.target }}.zip.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: bugbee-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Needed so `gh release create --verify-tag` can resolve the annotated tag.
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ls -la release/
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
          elif [[ "$GITHUB_REF_NAME" == *-* ]]; then
            gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes --prerelease \
              --title "Bugbee ${GITHUB_REF_NAME}" \
              --notes-file CHANGELOG.md
          else
            gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes \
              --title "Bugbee ${GITHUB_REF_NAME}"
          fi
