name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Run strict linting
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            executable: bugbee
          - os: macos-13
            target: x86_64-apple-darwin
            executable: bugbee
          - os: macos-14
            target: aarch64-apple-darwin
            executable: bugbee
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            executable: bugbee.exe

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --locked --release -p bugbee-cli

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C target/release -czf "dist/bugbee-${{ matrix.target }}.tar.gz" "${{ matrix.executable }}"
          sha256sum "dist/bugbee-${{ matrix.target }}.tar.gz" > "dist/bugbee-${{ matrix.target }}.tar.gz.sha256"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path "target/release/${{ matrix.executable }}" -DestinationPath "dist/bugbee-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "dist/bugbee-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  bugbee-${{ matrix.target }}.zip" | Out-File -Encoding ascii "dist/bugbee-${{ matrix.target }}.zip.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: bugbee-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes --prerelease
          else
            gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes
          fi
