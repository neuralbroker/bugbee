name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  security-engine:
    name: Security engine selftest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Run security selftest
        run: bun packages/bugbee/src/security/selftest.ts
      - name: Offline hunt on fixture
        run: |
          bun run --cwd packages/bugbee --conditions=browser src/index.ts hunt ./fixtures/python-vuln
          bun run --cwd packages/bugbee --conditions=browser src/index.ts findings --directory ./fixtures/python-vuln
